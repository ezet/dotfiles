*

#[main]

# Maps capslock to escape when pressed and control when held.
#overload = capslock(control, esc)

# Remaps the escape key to capslock
#esc = capslock

# Hold Alt to turn the home-row cluster into navigation.
# i/j/k/l = arrows, e/a = end/home, d/f = backspace/delete,
# u/o/p/; = word/paragraph motions (Alt+arrow passed through).
[alt]
## Arrows
k = down
i = up
j = left
l = right
e = end
a = home
d = backspace
f = delete
u = A-left
o = A-right
p = A-up
semicolon = A-down
