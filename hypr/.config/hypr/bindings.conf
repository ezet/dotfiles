# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
#bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT , B, Browser (Hoopit), exec, $browser --user-data-dir=.config/google-chrome-hoopit-profile/ --disable-web-security
#bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
#bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
# bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
#bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
#bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT CTRL, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com/app"
bindd = SUPER SHIFT, A, Toggle AI, togglespecialworkspace, ai
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"

#bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
#bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
#bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
#bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
#bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus /home/ezet/.local/share/JetBrains/Toolbox/scripts/pycharm
#bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
#bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
unbind = CTRL, F2
unbind = CTRL, F1
unbind = ALT,F12

bindd = SUPER SHIFT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bindd = SUPER SHIFT, M, Toggle spotify,togglespecialworkspace,music
bindd = SUPER SHIFT, T, Toggle activity,togglespecialworkspace,activity
bindd = SUPER SHIFT, D, Toggle docker,togglespecialworkspace,docker
bindd = SUPER SHIFT, Q, Toggle terminal,togglespecialworkspace,terminal
bindd = SUPER SHIFT, G, Move out of group, moveoutofgroup


bindd = SUPER CTRL, 1, Switch to group window 1, changegroupactive, 1
bindd = SUPER CTRL, 2, Switch to group window 2, changegroupactive, 2
bindd = SUPER CTRL, 3, Switch to group window 3, changegroupactive, 3
bindd = SUPER CTRL, 4, Switch to group window 4, changegroupactive, 4
bindd = SUPER CTRL, 5, Switch to group window 5, changegroupactive, 5

unbind = SUPER CTRL, LEFT
bindd = SUPER CTRL, LEFT, Move window to group on left, movewindoworgroup, l
unbind = SUPER CTRL, RIGHT
bindd = SUPER CTRL, RIGHT, Move window to group on right, movewindoworgroup, r
unbind = SUPER CTRL, UP
bindd = SUPER CTRL, UP, Move window to group on top, movewindoworgroup, u
unbind = SUPER CTRL, DOWN
bindd = SUPER CTRL, DOWN, Move window to group on bottom, movewindoworgroup, d
